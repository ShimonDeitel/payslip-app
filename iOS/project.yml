name: Payslip
options:
  bundleIdPrefix: com.shimondeitel.payslip
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Payslip:
    type: application
    platform: iOS
    sources:
      - path: Payslip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.payslip
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Payslip/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PayslipTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PayslipTests
      - path: Payslip.storekit
    dependencies:
      - target: Payslip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.payslip.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PayslipUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PayslipUITests
    dependencies:
      - target: Payslip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.payslip.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Payslip:
    build:
      targets:
        Payslip: all
        PayslipTests: [test]
        PayslipUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Payslip.storekit
    test:
      config: Debug
      storeKitConfiguration: Payslip.storekit
      targets:
        - PayslipTests
        - PayslipUITests
    archive:
      config: Release
